<!DOCTYPE html>
<html lang="en">
<head>

  <title>Mohamed H. Mousa</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #1a1a2e;
      color: #fff;
      padding: 48px 24px 36px;
      text-align: center;
    }

    header h1 {
      font-size: 2.6rem;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    header p.intro {
      font-size: 1.1rem;
      color: #b0b8d1;
      max-width: 620px;
      margin: 0 auto 24px;
      line-height: 1.7;
    }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0077b5;
      color: #fff;
      text-decoration: none;
      padding: 10px 22px;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: background 0.2s;
    }

    .linkedin-btn:hover { background: #005983; }

    .linkedin-btn svg {
      width: 18px;
      height: 18px;
      fill: #fff;
      flex-shrink: 0;
    }

    main {
      width: 100%;
      max-width: 960px;
      padding: 40px 24px;
    }

    main h2 {
      font-size: 1.3rem;
      color: #1a1a2e;
      margin-bottom: 16px;
      border-left: 4px solid #0077b5;
      padding-left: 12px;
    }

    .cv-container {
      width: 100%;
      border: 1px solid #d0d7e3;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      background: #fff;
    }

    .cv-container iframe {
      display: block;
      width: 100%;
      height: 860px;
      border: none;
    }

    .cv-download {
      display: inline-block;
      margin-top: 14px;
      color: #0077b5;
      text-decoration: none;
      font-size: 0.9rem;
    }

    .cv-download:hover { text-decoration: underline; }

    footer {
      margin-top: auto;
      padding: 24px;
      font-size: 0.82rem;
      color: #888;
      text-align: center;
    }
  </style>
</head>
